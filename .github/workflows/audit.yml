name: CodeSentinel — Risk Advisor & Ecosystem Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    name: PR Risk Assessment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CodeSentinel
        run: pip install git+https://github.com/YOUR_ORG/code-sentinel.git@main

      - name: Run Audit
        id: audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        run: |
          codesentinel review "${{ github.event.pull_request.html_url }}" \
            --format markdown \
            --output report.md \
            --skip-llm=false

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            // Find existing comment to update
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- codesentinel -->')
            );

            const body = `<!-- codesentinel -->\n${report}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body
              });
            }

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codesentinel-report
          path: report.md

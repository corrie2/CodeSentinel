name: "CodeSentinel — Risk Advisor & Ecosystem Auditor"
description: "PR risk assessment and impact analysis. Outputs a structured audit report."
author: "CodeSentinel"

inputs:
  pr_url:
    description: "Pull request URL (auto-detected in GitHub Actions)"
    required: false
    default: ""
  format:
    description: "Output format: markdown or json"
    required: false
    default: "markdown"
  skip_llm:
    description: "Skip LLM deep review (faster, no API key needed)"
    required: false
    default: "false"
  rules:
    description: "Custom rules TOML file path"
    required: false
    default: ""
  llm_provider:
    description: "LLM provider: mimo, deepseek, or openai"
    required: false
    default: "mimo"

outputs:
  risk_level:
    description: "Risk level: low, medium, or high"
    value: ${{ steps.audit.outputs.risk_level }}
  report_path:
    description: "Path to the generated report"
    value: ${{ steps.audit.outputs.report_path }}

runs:
  using: "composite"
  steps:
    - name: Install CodeSentinel
      shell: bash
      run: |
        pip install git+https://github.com/corrie2/CodeSentinel.git@main

    - name: Run Audit
      id: audit
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        PR_URL="${{ inputs.pr_url }}"
        if [ -z "$PR_URL" ]; then
          PR_URL="${{ github.event.pull_request.html_url }}"
        fi

        FORMAT="${{ inputs.format }}"
        SKIP_LLM="${{ inputs.skip_llm }}"
        RULES="${{ inputs.rules }}"
        PROVIDER="${{ inputs.llm_provider }}"

        ARGS="review $PR_URL --format $FORMAT"
        if [ "$SKIP_LLM" = "true" ]; then
          ARGS="$ARGS --skip-llm"
        fi
        if [ -n "$RULES" ]; then
          ARGS="$ARGS --rules $RULES"
        fi
        if [ -n "$PROVIDER" ]; then
          ARGS="$ARGS --provider $PROVIDER"
        fi

        # Determine output filename based on format
        if [ "$FORMAT" = "json" ]; then
          REPORT_FILE="report.json"
        else
          REPORT_FILE="report.md"
        fi

        codesentinel $ARGS --output "$REPORT_FILE"

        # Extract risk level for output (works for both markdown and JSON)
        if [ "$FORMAT" = "json" ]; then
          RISK=$(python3 -c "import json,sys; d=json.load(open('$REPORT_FILE')); print(d.get('risk',{}).get('level','unknown'))" 2>/dev/null || echo "unknown")
        else
          RISK=$(grep -oiP '(Low|Medium|High) Risk' "$REPORT_FILE" | head -1 | awk '{print tolower($1)}' || echo "unknown")
        fi
        echo "risk_level=$RISK" >> "$GITHUB_OUTPUT"
        echo "report_path=$REPORT_FILE" >> "$GITHUB_OUTPUT"
